services:
  - type: web
    name: liftiq-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python -m app.seed.seed_data && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: liftiq-db
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: DEV_AUTH_BYPASS
        value: "0"
      # Invite email delivery (Resend). Without RESEND_API_KEY, invite creation
      # still works but the email is skipped and the trainer shares the link
      # manually. INVITE_FROM_EMAIL must be a Resend-verified sender to reach
      # real client inboxes.
      - key: RESEND_API_KEY
        sync: false
      - key: INVITE_FROM_EMAIL
        sync: false

databases:
  - name: liftiq-db
    plan: free
    databaseName: liftiq
    user: liftiq
